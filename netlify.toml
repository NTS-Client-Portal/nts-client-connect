[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18.20.4"

# Only use the Next.js plugin, disable lighthouse for local dev
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─────────────────────────────────────────────────────────────────────
#  Never cache the service-worker kill switch. If /sw.js is ever
#  cached by a browser/CDN, the previously-installed stale SW keeps
#  serving old JS bundles forever. This header guarantees every
#  request for /sw.js is a fresh network hit.
# ─────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[dev]
  framework = "next"
  command = "npm run dev"
  
# For Next.js API routes in development
[[redirects]]
  from = "/api/*"
  to = "http://localhost:3000/api/:splat"
  status = 200
  force = false
  
# For production
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
